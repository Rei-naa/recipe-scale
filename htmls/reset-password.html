<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reset Password | RecipeScale</title>
  <link rel="icon" type="image/png" href="../assets/images/logo_RecipeScale.png" />
  <link rel="stylesheet" href="../css/styles.css" />
</head>
<body class="auth-page">
  <main class="auth-shell" aria-labelledby="authTitle">
    <section class="auth-card">
      <aside class="auth-visual" aria-label="RecipeScale baking workspace">
        <img src="../assets/images/sourdough-hero.png" alt="Fresh sourdough bread on a kitchen counter" />
        <div class="auth-visual-shade" aria-hidden="true"></div>
        <div class="auth-brand">
          <span class="auth-brand-mark" aria-hidden="true"></span>
          <span>RecipeScale</span>
        </div>
        <div class="auth-visual-copy">
          <h2>Scale your passion.</h2>
          <p>Precision in every portion, designed for the modern home chef.</p>
        </div>
      </aside>

      <section class="auth-panel">
        <a class="auth-back" href="login.html" aria-label="Back to login">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
          Back
        </a>

        <div class="auth-heading">
          <h1 id="authTitle">Reset Password</h1>
          <p>Your new password must be different from your previous passwords.</p>
        </div>

        <form class="auth-form" id="resetPasswordForm">
          <label class="auth-field" for="newPassword">
            <span>New Password</span>
            <span class="auth-password">
              <input id="newPassword" name="newPassword" type="password" autocomplete="new-password" placeholder="New Password" required />
              <button class="auth-eye" type="button" data-password-toggle aria-label="Show password">
                <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M2 12s3.5-6 10-6 10 6 10 6-3.5 6-10 6-10-6-10-6z"/><path d="M12 9a3 3 0 1 1 0 6 3 3 0 0 1 0-6z"/></svg>
              </button>
            </span>
          </label>

          <label class="auth-field" for="confirmPassword">
            <span>Confirm Password</span>
            <span class="auth-password">
              <input id="confirmPassword" name="confirmPassword" type="password" autocomplete="new-password" placeholder="Confirm Password" required />
              <button class="auth-eye" type="button" data-password-toggle aria-label="Show password">
                <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M2 12s3.5-6 10-6 10 6 10 6-3.5 6-10 6-10-6-10-6z"/><path d="M12 9a3 3 0 1 1 0 6 3 3 0 0 1 0-6z"/></svg>
              </button>
            </span>
          </label>

          <button class="btn btn-primary auth-submit" type="submit">Reset Password</button>
          <p id="resetPasswordMessage" class="auth-message" aria-live="polite"></p>
        </form>

        <footer class="auth-footer">
          <span>&copy; 2026 RecipeScale.</span>
          <nav aria-label="Authentication footer links">
            <a href="#">Privacy</a>
            <a href="#">Help</a>
          </nav>
        </footer>
      </section>
    </section>
  </main>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="../auth/supabase-auth.js"></script>
</body>
</html>
